<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FactuScan — Connexion PAYT</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z' stroke='%2355D6DE' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/><circle cx='12' cy='12' r='3' stroke='%2355D6DE' stroke-width='2.5'/></svg>"/>
<link rel="stylesheet" href="payt-design.css"/>
<style>
html,body{height:100%;overflow:hidden;}
.connect-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
.connect-card{width:min(420px,92vw);padding:36px;background:rgba(255,255,255,0.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.90);border-radius:var(--radius-xl);box-shadow:0 8px 32px rgba(85,214,222,0.08),0 2px 8px rgba(0,0,0,0.05);}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.logo-eye{width:28px;height:28px;flex-shrink:0;}
.logo-name{font-size:18px;font-weight:700;color:var(--navy);}
.connect-title{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:4px;}
.connect-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.5;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.token-wrap{position:relative;}
.token-wrap .input{padding-right:40px;font-family:monospace;font-size:13px;letter-spacing:.02em;}
.token-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center;justify-content:center;}
.token-toggle:hover{color:var(--navy);}
.error-msg{display:none;font-size:12px;color:var(--red);background:var(--red-bg,rgba(217,31,44,0.06));border:1px solid var(--red-border,rgba(217,31,44,0.20));border-radius:var(--radius);padding:8px 12px;margin-bottom:16px;}
.error-msg.show{display:block;}
.help-text{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4;}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="connect-wrap z-content">
  <div class="connect-card">
    <div class="logo-row">
      <svg class="logo-eye" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#55D6DE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="12" cy="12" r="3" stroke="#55D6DE" stroke-width="2.5"/>
      </svg>
      <span class="logo-name">FactuScan</span>
    </div>

    <div class="connect-title">Connexion PAYT</div>
    <div class="connect-sub">Entrez votre token API PAYT pour continuer. Il sera utilisé uniquement pour cette session.</div>

    <div class="error-msg" id="errorMsg"></div>

    <form onsubmit="handleConnect(event)">
      <div class="field">
        <label>Token API PAYT</label>
        <div class="token-wrap">
          <input class="input" type="password" id="inputToken" autocomplete="off" required placeholder="Collez votre token ici…"/>
          <button type="button" class="token-toggle" id="toggleBtn" onclick="toggleVisibility()" title="Afficher / masquer">
            <svg id="iconShow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="iconHide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
        <div class="help-text">Votre token se trouve dans les paramètres de votre compte PAYT, sous "API &amp; intégrations".</div>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:8px;" type="submit" id="btnConnect">Se connecter</button>
    </form>
  </div>
</div>

<script>
function toggleVisibility() {
  const input = document.getElementById('inputToken');
  const iconShow = document.getElementById('iconShow');
  const iconHide = document.getElementById('iconHide');
  if (input.type === 'password') {
    input.type = 'text';
    iconShow.style.display = 'none';
    iconHide.style.display = '';
  } else {
    input.type = 'password';
    iconShow.style.display = '';
    iconHide.style.display = 'none';
  }
}

async function handleConnect(e) {
  e.preventDefault();
  const token = document.getElementById('inputToken').value.trim();
  const btn = document.getElementById('btnConnect');
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Vérification…';

  try {
    const res = await fetch('/api/payt-administrations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token }),
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      const msg = data.message || 'Token invalide ou accès refusé.';
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      return;
    }

    // Token valid — store and redirect to main app
    sessionStorage.setItem('paytToken', token);
    window.location.href = '/invoice-processor.html';

  } catch (err) {
    errorMsg.textContent = "Impossible de joindre le serveur. Vérifiez votre connexion.";
    errorMsg.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Se connecter';
  }
}
</script>
</body>
</html>
